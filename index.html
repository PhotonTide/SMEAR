<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>SMEAR // reality trails</title>
<style>
  :root{
    --void:#050406; --line:rgba(255,255,255,.10); --dim:rgba(255,255,255,.42);
    --text:rgba(255,255,255,.86); --heat:#ff3b2f; --heat2:#ff7a1a; --cool:#7a4bff;
    --mono:"SFMono-Regular",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--void);color:var(--text);
    font-family:var(--mono);overflow:hidden;overscroll-behavior:none}
  canvas{position:fixed;inset:0;width:100vw;height:100vh;display:block;touch-action:none}

  #gate{position:fixed;inset:0;z-index:40;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:26px;
    background:radial-gradient(120% 120% at 50% 40%,#160a16 0%,#050406 70%)}
  #gate h1{margin:0;font-size:clamp(30px,9vw,64px);letter-spacing:.34em;font-weight:600;
    text-indent:.34em;background:linear-gradient(92deg,var(--cool),var(--heat) 60%,var(--heat2));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 24px rgba(255,59,47,.25))}
  #gate p{margin:0;max-width:330px;text-align:center;line-height:1.7;color:var(--dim);
    font-size:12.5px;letter-spacing:.06em}
  #enter{appearance:none;border:1px solid var(--line);background:rgba(255,255,255,.03);
    color:var(--text);font-family:var(--mono);font-size:13px;letter-spacing:.28em;
    padding:16px 34px;border-radius:2px;cursor:pointer;text-indent:.28em;
    transition:.25s;backdrop-filter:blur(8px)}
  #enter:hover{border-color:var(--heat);color:#fff;box-shadow:0 0 32px rgba(255,59,47,.25)}
  #enter:focus-visible{outline:2px solid var(--heat);outline-offset:3px}

  .bar{position:fixed;z-index:20;left:0;right:0;top:0;display:flex;align-items:center;
    gap:8px;padding:calc(env(safe-area-inset-top) + 12px) 12px 12px;pointer-events:none}
  .bar .grp{display:flex;gap:6px;pointer-events:auto}
  .bar .spacer{flex:1}
  button.chip{appearance:none;font-family:var(--mono);font-size:11px;letter-spacing:.12em;
    color:var(--dim);background:rgba(10,8,14,.55);border:1px solid var(--line);
    border-radius:2px;padding:9px 11px;cursor:pointer;backdrop-filter:blur(10px);
    transition:.18s;white-space:nowrap}
  button.chip:hover{color:var(--text);border-color:rgba(255,255,255,.24)}
  button.chip.on{color:#fff;border-color:var(--heat);
    box-shadow:inset 0 0 0 1px rgba(255,59,47,.35),0 0 18px rgba(255,59,47,.15)}
  button.chip:focus-visible{outline:2px solid var(--heat);outline-offset:2px}
  #rec{width:44px;height:44px;border-radius:50%;padding:0;display:grid;place-items:center}
  #rec .dot{width:16px;height:16px;border-radius:50%;background:var(--heat);transition:.2s}
  #rec.recording{border-color:var(--heat)}
  #rec.recording .dot{border-radius:3px;width:14px;height:14px;animation:pulse 1.1s ease-in-out infinite}
  @keyframes pulse{50%{opacity:.35}}
  #timer{font-size:11px;letter-spacing:.14em;color:var(--heat);pointer-events:none;
    align-self:center;min-width:44px;opacity:0;transition:.2s}
  #timer.show{opacity:1}

  .rail{position:fixed;z-index:20;left:0;right:0;
    bottom:calc(env(safe-area-inset-bottom) + 76px);display:flex;gap:6px;overflow-x:auto;
    padding:0 12px;pointer-events:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .rail::-webkit-scrollbar{display:none}

  #panel{position:fixed;z-index:20;bottom:calc(env(safe-area-inset-bottom) + 12px);
    left:50%;transform:translateX(-50%);width:calc(100% - 24px);max-width:660px;
    background:rgba(8,6,12,.72);border:1px solid var(--line);border-radius:6px;
    backdrop-filter:blur(16px);padding:14px 14px 6px;display:none;
    grid-template-columns:1fr 1fr;gap:12px 20px}
  #panel.open{display:grid}
  .palrow{grid-column:1/-1;display:flex;gap:6px}
  .palrow button{flex:1}
  .midirow{grid-column:1/-1;display:flex;align-items:center;gap:6px;flex-wrap:wrap;
    border-bottom:1px solid var(--line);padding-bottom:11px}
  .midirow .lbl{font-size:10px;letter-spacing:.08em;color:var(--dim);
    max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .badge{font-family:var(--mono);font-size:9px;letter-spacing:.08em;color:var(--dim);
    border:1px solid var(--line);background:transparent;border-radius:2px;padding:3px 6px;
    cursor:pointer;transition:.15s;white-space:nowrap}
  .badge:hover{color:var(--text);border-color:rgba(255,255,255,.28)}
  .badge.map{color:var(--heat);border-color:rgba(255,59,47,.45)}
  .badge.learn{color:#fff;border-color:var(--heat);animation:pulse .8s ease-in-out infinite}
  .badge:focus-visible{outline:2px solid var(--heat);outline-offset:2px}
  .ctl{display:flex;flex-direction:column;gap:6px}
  .ctl label{display:flex;justify-content:space-between;align-items:center;gap:8px;
    font-size:10.5px;letter-spacing:.1em;color:var(--dim)}
  .ctl label .rt{display:flex;align-items:center;gap:6px}
  .ctl label b{color:var(--text);font-weight:500;min-width:30px;text-align:right}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:2px;
    background:rgba(255,255,255,.16);border-radius:2px;outline:none;margin:6px 0}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;
    border-radius:50%;background:var(--heat);cursor:pointer;
    box-shadow:0 0 12px rgba(255,59,47,.5);border:2px solid #150a10}
  input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;
    background:var(--heat);cursor:pointer;border:2px solid #150a10}
  input[type=range]:focus-visible{outline:2px solid var(--heat);outline-offset:6px}

  #toast{position:fixed;z-index:30;left:50%;bottom:calc(env(safe-area-inset-bottom) + 88px);
    transform:translateX(-50%);background:rgba(8,6,12,.9);border:1px solid var(--heat);
    color:#fff;font-size:11px;letter-spacing:.1em;padding:10px 16px;border-radius:3px;
    opacity:0;transition:.3s;pointer-events:none;text-align:center;max-width:88vw}
  #toast.show{opacity:1}
  input[type=file]{display:none}
</style>
</head>
<body>
<canvas id="gl"></canvas>

<div class="bar">
  <div class="grp">
    <button class="chip on" id="srcCam">CAM</button>
    <button class="chip" id="flip">FLIP</button>
    <button class="chip" id="srcFile">FILE</button>
  </div>
  <div class="spacer"></div>
  <span id="timer">0:00</span>
  <div class="grp">
    <button class="chip" id="shot">JPG</button>
    <button class="chip" id="rec"><span class="dot"></span></button>
    <button class="chip" id="tune">TUNE</button>
  </div>
</div>

<div class="rail" id="rail"></div>
<div id="panel"></div>
<div id="toast"></div>
<input type="file" id="file" accept="video/*" />

<div id="gate">
  <h1>SMEAR</h1>
  <p>reality trails. as you move, a full afterimage of you is left behind, dissolving where you were. tap to wake the camera, then record video or grab a jpg straight to your camera roll.</p>
  <button id="enter">ENTER</button>
</div>

<video id="video" playsinline muted autoplay style="display:none"></video>

<script>
/* ============================================================
   SMEAR // reality trails
   afterimage w/ region fill: a blurred low-res activity mask
   prints the whole moving figure into the trail, not just edges
   ============================================================ */
const cvs=document.getElementById('gl');
const gl=cvs.getContext('webgl2',{preserveDrawingBuffer:false,antialias:false,alpha:false});
const video=document.getElementById('video');
if(!gl){document.getElementById('gate').innerHTML=
  '<p style="color:#ff3b2f;max-width:300px;text-align:center;line-height:1.7">this browser has no WebGL2. open in Safari or Chrome.</p>';}

const extF=gl.getExtension('EXT_color_buffer_float')||gl.getExtension('EXT_color_buffer_half_float');
gl.getExtension('OES_texture_float_linear');
let HALF=!!extF;

/* ---------- shaders ---------- */
const VS=`#version 300 es
in vec2 aPos; out vec2 vUv;
void main(){ vUv=aPos*0.5+0.5; gl_Position=vec4(aPos,0.,1.); }`;

const COMMON=`
float luma(vec3 c){ return dot(c,vec3(0.299,0.587,0.114)); }
float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
vec3 hueRot(vec3 c,float a){ const vec3 k=vec3(0.57735);
  float ca=cos(a); return c*ca+cross(k,c)*sin(a)+k*dot(k,c)*(1.0-ca); }
vec3 hsv2rgb(vec3 c){ vec4 K=vec4(1.,2./3.,1./3.,3.);
  vec3 p=abs(fract(c.xxx+K.xyz)*6.-K.www); return c.z*mix(K.xxx,clamp(p-K.xxx,0.,1.),c.y); }
`;

/* activity mask: frame difference, rendered at low res so it fills into a
   soft blob covering the whole moving region rather than just its edges */
const MOTION=`#version 300 es
precision highp float;
in vec2 vUv; out vec4 frag;
uniform sampler2D uCam,uPrev; uniform float uMirror;
`+COMMON+`
void main(){ vec2 uv=vUv; if(uMirror>0.5) uv.x=1.0-uv.x;
  float d=abs(luma(texture(uCam,uv).rgb)-luma(texture(uPrev,uv).rgb));
  frag=vec4(vec3(d),1.0); }`;

/* afterimage: old paint fades in place, moving figure stamps new paint on top.
   injection is weighted by the filled region mask, so the whole face prints. */
const DYE=`#version 300 es
precision highp float;
in vec2 vUv; out vec4 frag;
uniform sampler2D uDye,uCam,uPrev,uMotion;
uniform vec2 uRes;
uniform float uTime,uDecay,uSens,uFill,uSmear,uMelt,uMosh,uBlock,uHue,uMirror;
`+COMMON+`
void main(){
  vec2 uv=vUv; vec2 cuv=uv; if(uMirror>0.5) cuv.x=1.0-cuv.x;
  vec2 tx=1.0/uRes;

  vec3 cam =texture(uCam ,cuv).rgb;
  vec3 prev=texture(uPrev,cuv).rgb;
  float It=luma(cam)-luma(prev);

  float edge=smoothstep(uSens,uSens+0.08, abs(It));               // crisp moving edges
  float region=smoothstep(uSens*0.5, uSens*0.5+0.12, texture(uMotion,uv).r); // filled blob
  float inj=clamp(max(edge, region*uFill), 0.0, 1.0);            // whole figure prints

  float Ix=luma(texture(uCam,cuv+vec2(tx.x,0.)).rgb)-luma(texture(uCam,cuv-vec2(tx.x,0.)).rgb);
  float Iy=luma(texture(uCam,cuv+vec2(0.,tx.y)).rgb)-luma(texture(uCam,cuv-vec2(0.,tx.y)).rgb);
  vec2 flow=-It*vec2(Ix,Iy)/(Ix*Ix+Iy*Iy+1e-3);
  vec2 fdir = length(flow)>1e-5 ? normalize(flow) : vec2(0.0);

  vec2 ruv=uv;
  ruv += fdir * uSmear * 3.0 * tx * (0.4+inj);
  ruv = 0.5+(ruv-0.5)*(1.0-uMelt*0.02);

  vec2 block=floor(uv*uBlock)/uBlock;
  float bh=hash(block+floor(uTime*8.0)*0.137);
  vec2 bdir=normalize(vec2(bh-0.5,hash(block.yx)-0.5)+1e-4);
  float bmot=smoothstep(uSens,uSens+0.1, abs(luma(texture(uCam,block).rgb)-luma(texture(uPrev,block).rgb)));
  ruv -= bdir*bmot*uMosh*0.05*step(0.55,hash(block+0.7));

  vec3 old=texture(uDye,ruv).rgb * uDecay;
  vec3 D=max(old, cam*inj);          // stamp the whole moving figure into the trail
  D=hueRot(D, uHue*0.04);
  frag=vec4(D,1.0);
}`;

const BRIGHT=`#version 300 es
precision highp float;
in vec2 vUv; out vec4 frag;
uniform sampler2D uTex; uniform float uThresh;
`+COMMON+`
void main(){ vec3 c=texture(uTex,vUv).rgb; float b=smoothstep(uThresh,uThresh+0.25,luma(c));
  frag=vec4(c*b,1.0); }`;

const BLUR=`#version 300 es
precision highp float;
in vec2 vUv; out vec4 frag;
uniform sampler2D uTex; uniform vec2 uDir;
void main(){
  vec3 s = texture(uTex,vUv).rgb*0.227027;
  s += texture(uTex,vUv+uDir*1.3846).rgb*0.316216;
  s += texture(uTex,vUv-uDir*1.3846).rgb*0.316216;
  s += texture(uTex,vUv+uDir*3.2308).rgb*0.070270;
  s += texture(uTex,vUv-uDir*3.2308).rgb*0.070270;
  frag=vec4(s,1.0);
}`;

const COMP=`#version 300 es
precision highp float;
in vec2 vUv; out vec4 frag;
uniform sampler2D uCam,uDye,uBloomTex;
uniform vec2 uRes;
uniform float uTime,uAber,uPalMix,uPal,uShatter,uScan,uMirror,uGrain,uBase,uBloom,uBreathe;
`+COMMON+`
vec3 thermal(float t){ t=clamp(t,0.,1.);
  vec3 c0=vec3(0.02,0.,0.08),c1=vec3(0.18,0.02,0.38),c2=vec3(0.76,0.07,0.32),
       c3=vec3(0.99,0.34,0.12),c4=vec3(1.,0.80,0.28),c5=vec3(1.,1.,0.94);
  if(t<0.2) return mix(c0,c1,t/0.2);
  if(t<0.4) return mix(c1,c2,(t-0.2)/0.2);
  if(t<0.6) return mix(c2,c3,(t-0.4)/0.2);
  if(t<0.8) return mix(c3,c4,(t-0.6)/0.2);
  return mix(c4,c5,(t-0.8)/0.2); }
vec3 acid(float t){ t=clamp(t,0.,1.);
  return hsv2rgb(vec3(fract(t*0.9+0.02), 0.85, clamp(0.12+t*1.25,0.,1.))); }
vec3 duo(float t){ t=clamp(t,0.,1.);
  vec3 a=vec3(0.02,0.0,0.08), b=vec3(0.48,0.29,1.0), c=vec3(1.0,0.23,0.18), d=vec3(1.,1.,.95);
  if(t<0.4) return mix(a,b,t/0.4);
  if(t<0.75) return mix(b,c,(t-0.4)/0.35);
  return mix(c,d,(t-0.75)/0.25); }
vec3 pal(float t,float m){ if(m<1.5) return thermal(t); if(m<2.5) return acid(t); return duo(t); }
void main(){
  vec2 uv=vUv; float t=uTime;
  vec2 bo = uBreathe*0.01*0.5*vec2(
      sin(uv.y*8.0+t*1.3)+0.5*sin(uv.y*17.0-t*0.7),
      cos(uv.x*8.0-t*1.1)+0.5*cos(uv.x*15.0+t*0.9));
  vec2 wuv=uv+bo;
  vec2 cuv=wuv; if(uMirror>0.5) cuv.x=1.0-cuv.x;

  float line=floor(uv.y*uRes.y*0.5);
  float jit=(hash(vec2(line,floor(t*20.0)))-0.5)*uShatter*0.05;
  vec2 suv=wuv+vec2(jit,0.0);
  vec2 dir=uv-0.5; float ab=uAber*0.02;

  vec3 tr;
  tr.r=texture(uDye,suv+dir*ab).r;
  tr.g=texture(uDye,suv).g;
  tr.b=texture(uDye,suv-dir*ab).b;
  if(uPal>0.5) tr=mix(tr, pal(luma(tr)*1.4, uPal), uPalMix);

  vec3 base;
  base.r=texture(uCam,cuv+dir*ab*0.4).r;
  base.g=texture(uCam,cuv).g;
  base.b=texture(uCam,cuv-dir*ab*0.4).b;
  base*=uBase;

  vec3 col=1.0-(1.0-base)*(1.0-tr);
  vec3 bloom=texture(uBloomTex,wuv).rgb;
  col=1.0-(1.0-col)*(1.0-bloom*uBloom);

  col*=1.0-uScan*0.5*(0.5+0.5*sin(uv.y*uRes.y*1.5));
  col+=(hash(uv+fract(t))-0.5)*uGrain*0.15;
  frag=vec4(col,1.0);
}`;

/* ---------- gl helpers ---------- */
function sh(t,s){const o=gl.createShader(t);gl.shaderSource(o,s);gl.compileShader(o);
  if(!gl.getShaderParameter(o,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(o));return o;}
function prog(v,f){const p=gl.createProgram();gl.attachShader(p,sh(gl.VERTEX_SHADER,v));
  gl.attachShader(p,sh(gl.FRAGMENT_SHADER,f));gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS))console.error(gl.getProgramInfoLog(p));return p;}
const pMotion=prog(VS,MOTION), pDye=prog(VS,DYE), pBright=prog(VS,BRIGHT), pBlur=prog(VS,BLUR), pComp=prog(VS,COMP);

const quad=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,quad);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
function bindQuad(p){const l=gl.getAttribLocation(p,'aPos');
  gl.bindBuffer(gl.ARRAY_BUFFER,quad);gl.enableVertexAttribArray(l);
  gl.vertexAttribPointer(l,2,gl.FLOAT,false,0,0);}
function tex(){const t=gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,t);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);return t;}

let W=1,H=1,BW=1,BH=1,MW=1,MH=1;
let camTex=[tex(),tex()], camIdx=0;
let dyeTex=[tex(),tex()], dyeFbo=[gl.createFramebuffer(),gl.createFramebuffer()], dyeSrc=0;
let bloomTex=[tex(),tex()], bloomFbo=[gl.createFramebuffer(),gl.createFramebuffer()];
let motTex=[tex(),tex()], motFbo=[gl.createFramebuffer(),gl.createFramebuffer()];

function allocFloat(t,w,h){gl.bindTexture(gl.TEXTURE_2D,t);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA16F,w,h,0,gl.RGBA,gl.HALF_FLOAT,null);}
function alloc8(t,w,h){gl.bindTexture(gl.TEXTURE_2D,t);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,w,h,0,gl.RGBA,gl.UNSIGNED_BYTE,null);}
function attach(fbo,t){gl.bindFramebuffer(gl.FRAMEBUFFER,fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,t,0);
  gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT);}

function allocTargets(){
  for(let i=0;i<2;i++){
    HALF?allocFloat(dyeTex[i],W,H):alloc8(dyeTex[i],W,H);
    gl.bindFramebuffer(gl.FRAMEBUFFER,dyeFbo[i]);
    gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,dyeTex[i],0);
    if(gl.checkFramebufferStatus(gl.FRAMEBUFFER)!==gl.FRAMEBUFFER_COMPLETE && HALF){
      HALF=false; gl.bindFramebuffer(gl.FRAMEBUFFER,null); return allocTargets();
    }
    gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT);
  }
  for(let i=0;i<2;i++){ alloc8(bloomTex[i],BW,BH); attach(bloomFbo[i],bloomTex[i]); }
  for(let i=0;i<2;i++){ alloc8(motTex[i],MW,MH); attach(motFbo[i],motTex[i]); }
  for(let i=0;i<2;i++) alloc8(camTex[i],W,H);
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
}
function resize(){
  const dpr=Math.min(window.devicePixelRatio||1,2);
  let w=cvs.clientWidth*dpr,h=cvs.clientHeight*dpr;
  const maxEdge=1600,m=Math.max(w,h);
  if(m>maxEdge){const s=maxEdge/m;w*=s;h*=s;}
  W=Math.max(2,Math.round(w));H=Math.max(2,Math.round(h));
  BW=Math.max(1,W>>2);BH=Math.max(1,H>>2);
  MW=Math.max(1,W>>3);MH=Math.max(1,H>>3);
  cvs.width=W;cvs.height=H;allocTargets();
}
window.addEventListener('resize',resize);

/* ---------- params ---------- */
const P={ decay:0.968, sens:0.05, fill:0.7, smear:0.4, melt:0.15, mosh:0.4, block:24,
  aber:0.5, pal:1, thermal:0.3, bloom:0.4, breathe:0.25, hue:0.0,
  shatter:0.15, scan:0.12, base:0.55, grain:0.22 };
const u=(p,n,v)=>gl.uniform1f(gl.getUniformLocation(p,n),v);

/* ---------- photo export ---------- */
let pendingShot=false;
function grabPhoto(){
  cvs.toBlob(b=>{ if(!b){ toast('capture failed'); return; }
    const url=URL.createObjectURL(b);
    const a=document.createElement('a'); a.href=url; a.download=`smear_${Date.now()}.jpg`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),4000);
    toast('saved · jpg');
  },'image/jpeg',0.95);
}

/* ---------- render ---------- */
let t0=performance.now(), mirror=0, ready=false;
function frame(now){
  requestAnimationFrame(frame);
  if(!ready||video.readyState<2) return;
  const time=(now-t0)/1000, cur=camIdx, prev=1-camIdx;

  gl.bindTexture(gl.TEXTURE_2D,camTex[cur]);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL,true);
  try{ gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,video); }catch(e){}
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL,false);

  const dyeDst=1-dyeSrc;

  /* activity mask (low res) + blur to fill the whole moving region */
  gl.viewport(0,0,MW,MH);
  gl.bindFramebuffer(gl.FRAMEBUFFER,motFbo[0]);
  gl.useProgram(pMotion); bindQuad(pMotion);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,camTex[cur]);gl.uniform1i(gl.getUniformLocation(pMotion,'uCam'),0);
  gl.activeTexture(gl.TEXTURE1);gl.bindTexture(gl.TEXTURE_2D,camTex[prev]);gl.uniform1i(gl.getUniformLocation(pMotion,'uPrev'),1);
  u(pMotion,'uMirror',mirror);
  gl.drawArrays(gl.TRIANGLES,0,3);
  gl.useProgram(pBlur); bindQuad(pBlur);
  gl.bindFramebuffer(gl.FRAMEBUFFER,motFbo[1]);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,motTex[0]);gl.uniform1i(gl.getUniformLocation(pBlur,'uTex'),0);
  gl.uniform2f(gl.getUniformLocation(pBlur,'uDir'),2.5/MW,0);
  gl.drawArrays(gl.TRIANGLES,0,3);
  gl.bindFramebuffer(gl.FRAMEBUFFER,motFbo[0]);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,motTex[1]);gl.uniform1i(gl.getUniformLocation(pBlur,'uTex'),0);
  gl.uniform2f(gl.getUniformLocation(pBlur,'uDir'),0,2.5/MH);
  gl.drawArrays(gl.TRIANGLES,0,3);

  /* dye / afterimage */
  gl.bindFramebuffer(gl.FRAMEBUFFER,dyeFbo[dyeDst]); gl.viewport(0,0,W,H);
  gl.useProgram(pDye); bindQuad(pDye);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,dyeTex[dyeSrc]);gl.uniform1i(gl.getUniformLocation(pDye,'uDye'),0);
  gl.activeTexture(gl.TEXTURE1);gl.bindTexture(gl.TEXTURE_2D,camTex[cur]);gl.uniform1i(gl.getUniformLocation(pDye,'uCam'),1);
  gl.activeTexture(gl.TEXTURE2);gl.bindTexture(gl.TEXTURE_2D,camTex[prev]);gl.uniform1i(gl.getUniformLocation(pDye,'uPrev'),2);
  gl.activeTexture(gl.TEXTURE3);gl.bindTexture(gl.TEXTURE_2D,motTex[0]);gl.uniform1i(gl.getUniformLocation(pDye,'uMotion'),3);
  gl.uniform2f(gl.getUniformLocation(pDye,'uRes'),W,H);
  u(pDye,'uTime',time);u(pDye,'uDecay',P.decay);u(pDye,'uSens',P.sens);u(pDye,'uFill',P.fill);u(pDye,'uSmear',P.smear);
  u(pDye,'uMelt',P.melt);u(pDye,'uMosh',P.mosh);u(pDye,'uBlock',P.block);u(pDye,'uHue',P.hue);u(pDye,'uMirror',mirror);
  gl.drawArrays(gl.TRIANGLES,0,3);

  /* bloom */
  gl.viewport(0,0,BW,BH);
  gl.bindFramebuffer(gl.FRAMEBUFFER,bloomFbo[0]);
  gl.useProgram(pBright); bindQuad(pBright);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,dyeTex[dyeDst]);gl.uniform1i(gl.getUniformLocation(pBright,'uTex'),0);
  u(pBright,'uThresh',0.35);
  gl.drawArrays(gl.TRIANGLES,0,3);
  gl.useProgram(pBlur); bindQuad(pBlur);
  gl.bindFramebuffer(gl.FRAMEBUFFER,bloomFbo[1]);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,bloomTex[0]);gl.uniform1i(gl.getUniformLocation(pBlur,'uTex'),0);
  gl.uniform2f(gl.getUniformLocation(pBlur,'uDir'),1.5/BW,0);
  gl.drawArrays(gl.TRIANGLES,0,3);
  gl.bindFramebuffer(gl.FRAMEBUFFER,bloomFbo[0]);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,bloomTex[1]);gl.uniform1i(gl.getUniformLocation(pBlur,'uTex'),0);
  gl.uniform2f(gl.getUniformLocation(pBlur,'uDir'),0,1.5/BH);
  gl.drawArrays(gl.TRIANGLES,0,3);

  /* composite */
  gl.bindFramebuffer(gl.FRAMEBUFFER,null); gl.viewport(0,0,W,H);
  gl.useProgram(pComp); bindQuad(pComp);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,camTex[cur]);gl.uniform1i(gl.getUniformLocation(pComp,'uCam'),0);
  gl.activeTexture(gl.TEXTURE1);gl.bindTexture(gl.TEXTURE_2D,dyeTex[dyeDst]);gl.uniform1i(gl.getUniformLocation(pComp,'uDye'),1);
  gl.activeTexture(gl.TEXTURE2);gl.bindTexture(gl.TEXTURE_2D,bloomTex[0]);gl.uniform1i(gl.getUniformLocation(pComp,'uBloomTex'),2);
  gl.uniform2f(gl.getUniformLocation(pComp,'uRes'),W,H);
  u(pComp,'uTime',time);u(pComp,'uAber',P.aber);u(pComp,'uPalMix',P.thermal);u(pComp,'uPal',P.pal);
  u(pComp,'uShatter',P.shatter);u(pComp,'uScan',P.scan);u(pComp,'uMirror',mirror);u(pComp,'uGrain',P.grain);
  u(pComp,'uBase',P.base);u(pComp,'uBloom',P.bloom);u(pComp,'uBreathe',P.breathe);
  gl.drawArrays(gl.TRIANGLES,0,3);

  if(pendingShot){ pendingShot=false; grabPhoto(); }

  dyeSrc=dyeDst; camIdx=prev;
}
requestAnimationFrame(frame);

/* ---------- sources ---------- */
let stream=null, facing='environment', usingFile=false;
async function startCam(){
  usingFile=false;
  if(stream) stream.getTracks().forEach(t=>t.stop());
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:facing,width:{ideal:1280},height:{ideal:720}},audio:false});
    video.srcObject=stream; video.loop=false; video.muted=true; await video.play();
    mirror=facing==='user'?1:0; resize(); ready=true;
    setChip('srcCam',true); setChip('srcFile',false);
  }catch(e){ toast('camera blocked. check permissions.'); }
}
function useFile(f){
  usingFile=true;
  if(stream) stream.getTracks().forEach(t=>t.stop());
  video.srcObject=null; video.src=URL.createObjectURL(f);
  video.loop=true; video.muted=true; mirror=0; video.play(); resize(); ready=true;
  setChip('srcCam',false); setChip('srcFile',true);
}

/* ---------- recording ---------- */
let recorder=null,chunks=[],recStart=0,recTimer=null;
function pickMime(){
  const c=['video/mp4;codecs=avc1.42E01E','video/mp4;codecs=avc1','video/mp4',
           'video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];
  for(const m of c){ if(window.MediaRecorder&&MediaRecorder.isTypeSupported(m)) return m; }
  return '';
}
function startRec(){
  const cs=cvs.captureStream(60), mime=pickMime();
  try{ recorder=new MediaRecorder(cs,mime?{mimeType:mime,videoBitsPerSecond:12e6}:{}); }
  catch(e){ toast('recording not supported here'); return; }
  chunks=[];
  recorder.ondataavailable=e=>{ if(e.data.size) chunks.push(e.data); };
  recorder.onstop=()=>{
    const type=recorder.mimeType||mime||'video/webm';
    const ext=type.includes('mp4')?'mp4':'webm';
    const blob=new Blob(chunks,{type}), url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=`smear_${Date.now()}.${ext}`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),4000);
    toast(ext==='mp4'?'saved · mp4 ready for camera roll':'saved · webm (mp4 only on iphone)');
  };
  recorder.start(); recStart=performance.now();
  document.getElementById('rec').classList.add('recording');
  document.getElementById('timer').classList.add('show');
  recTimer=setInterval(()=>{const s=Math.floor((performance.now()-recStart)/1000);
    document.getElementById('timer').textContent=`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;},500);
}
function stopRec(){
  if(recorder&&recorder.state!=='inactive') recorder.stop();
  clearInterval(recTimer);
  document.getElementById('rec').classList.remove('recording');
  document.getElementById('timer').classList.remove('show');
}

/* ---------- presets ---------- */
const PRESETS={
  GHOST:   {decay:.985,sens:.04, fill:.9, smear:.3, melt:.1, mosh:.15,block:24,aber:.45,pal:1,thermal:.25,bloom:.5, breathe:.3, hue:0, shatter:.08,scan:.1, base:.5, grain:.2},
  SMEAR:   {decay:.968,sens:.045,fill:.7, smear:.6, melt:.15,mosh:.2, block:24,aber:.4, pal:1,thermal:0,  bloom:.4, breathe:.25,hue:0, shatter:.08,scan:.1, base:.55,grain:.2},
  ECHO:    {decay:.98, sens:.04, fill:.55,smear:.12,melt:.05,mosh:.1, block:24,aber:.5, pal:0,thermal:0,  bloom:.35,breathe:.2, hue:0, shatter:.06,scan:.08,base:.55,grain:.2},
  DATAMOSH:{decay:.955,sens:.05, fill:.6, smear:.25,melt:.1, mosh:.9, block:16,aber:.6, pal:1,thermal:.2, bloom:.3, breathe:.15,hue:0, shatter:.25,scan:.12,base:.6, grain:.35},
  THERMAL: {decay:.972,sens:.045,fill:.75,smear:.4, melt:.12,mosh:.3, block:22,aber:.4, pal:1,thermal:.92,bloom:.55,breathe:.3, hue:0, shatter:.12,scan:.1, base:.34,grain:.22},
  SHATTER: {decay:.95, sens:.06, fill:.6, smear:.35,melt:.1, mosh:.4, block:20,aber:.9, pal:1,thermal:.15,bloom:.4, breathe:.35,hue:0, shatter:.7, scan:.18,base:.55,grain:.4},
  ACID:    {decay:.98, sens:.04, fill:.8, smear:.5, melt:.12,mosh:.25,block:26,aber:.8, pal:2,thermal:.9, bloom:.6, breathe:.5, hue:1, shatter:.2, scan:.1, base:.42,grain:.25}
};
let curPreset='SMEAR';
function applyPreset(n){ Object.assign(P,PRESETS[n]); curPreset=n;
  document.querySelectorAll('.rail .chip').forEach(c=>c.classList.toggle('on',c.dataset.p===n));
  buildPanel(); saveState();
}
function cyclePreset(d){ const k=Object.keys(PRESETS);
  applyPreset(k[(k.indexOf(curPreset)+d+k.length)%k.length]); }

/* ---------- UI ---------- */
const rail=document.getElementById('rail');
Object.keys(PRESETS).forEach((n,i)=>{const b=document.createElement('button');
  b.className='chip'+(i===1?' on':'');b.textContent=n;b.dataset.p=n;
  b.onclick=()=>applyPreset(n);rail.appendChild(b);});

const PALS=['OFF','THERMAL','ACID','DUO'];
const FIELDS=[
  ['decay','persistence',0.85,0.995,0.005],
  ['fill','figure fill',0,1,0.01],
  ['sens','sensitivity',0.01,0.2,0.005],
  ['smear','streak',0,1.5,0.01],
  ['bloom','bloom',0,1,0.01],
  ['breathe','breathe',0,1,0.01],
  ['thermal','palette mix',0,1,0.01],
  ['hue','hue cycle',0,1,0.01],
  ['aber','chromatic',0,1.5,0.01],
  ['mosh','datamosh',0,1.5,0.01],
  ['block','block size',6,60,1],
  ['melt','melt',0,1,0.01],
  ['shatter','shatter',0,1,0.01],
  ['scan','scanlines',0,0.6,0.01],
  ['base','base image',0,1,0.01],
  ['grain','grain',0,1,0.01]
];
/* ---------- persistence ----------
   survives reload for live use. wrapped: if storage is unavailable
   (private mode, embedded preview) the tool still runs, just won't remember. */
const STORE='smear.state.v1';
let saveT, hadSavedMidi=false;
function saveState(){
  try{ localStorage.setItem(STORE, JSON.stringify({
    map:midiMap, P:P, preset:curPreset, midi:(midiState==='on')
  })); }catch(e){}
}
function queueSave(){ clearTimeout(saveT); saveT=setTimeout(saveState,400); }
function loadState(){
  try{ const s=localStorage.getItem(STORE); return s?JSON.parse(s):null; }catch(e){ return null; }
}
function wipeState(){ try{ localStorage.removeItem(STORE); }catch(e){} }

/* ---------- midi ---------- */
const ACTIONS={
  'JPG'   :()=>{ pendingShot=true; },
  'REC'   :()=>{ if(recorder&&recorder.state==='recording') stopRec(); else startRec(); },
  'PRE +' :()=>cyclePreset(1),
  'PRE -' :()=>cyclePreset(-1),
  'PAL'   :()=>{ P.pal=(P.pal+1)%PALS.length; buildPanel(); },
  'FLIP'  :()=>{ if(!usingFile){ facing=facing==='user'?'environment':'user'; startCam(); } }
};
const midiMap={cc:{},note:{}};      // num -> {type:'param'|'action', key}
let midiState='off', midiDev='', learnTarget=null;
const uiRefs={};

function findBinding(type,key){
  for(const n in midiMap.cc)   if(midiMap.cc[n].type===type   && midiMap.cc[n].key===key)   return 'CC'+n;
  for(const n in midiMap.note) if(midiMap.note[n].type===type && midiMap.note[n].key===key) return 'N'+n;
  return null;
}
function armLearn(type,key){
  if(midiState!=='on'){ toast('connect midi first'); return; }
  if(learnTarget && learnTarget.type===type && learnTarget.key===key){ learnTarget=null; buildPanel(); return; }
  learnTarget={type,key}; buildPanel();
  toast('move a knob or hit a pad to bind');
}
function bindLearn(msg,num){
  for(const m of ['cc','note']) for(const n in midiMap[m])
    if(midiMap[m][n].type===learnTarget.type && midiMap[m][n].key===learnTarget.key) delete midiMap[m][n];
  midiMap[msg][num]={type:learnTarget.type,key:learnTarget.key};
  toast(`${learnTarget.key} · ${msg==='cc'?'CC':'note '}${num}`);
  learnTarget=null; buildPanel(); saveState();
}
function setParam(k,val){
  P[k]=val; queueSave();
  const r=uiRefs[k]; if(!r) return;
  r.input.value=val; r.val.textContent=Number(val).toFixed(r.step<1?2:0);
}
function setParamFromCC(k,v){
  const f=FIELDS.find(x=>x[0]===k); if(!f) return;
  const mn=f[2],mx=f[3],st=f[4];
  let val=mn+(v/127)*(mx-mn);
  val=Math.round(val/st)*st;
  setParam(k, Math.min(mx,Math.max(mn,val)));
}
function onMidi(e){
  const st=e.data[0], d1=e.data[1], d2=e.data[2], type=st&0xf0;
  if(type===0xB0){                                   // control change
    if(learnTarget){ bindLearn('cc',d1); return; }
    const m=midiMap.cc[d1]; if(!m) return;
    if(m.type==='param') setParamFromCC(m.key,d2);
    else if(d2>0 && ACTIONS[m.key]) ACTIONS[m.key]();
  } else if(type===0x90 && d2>0){                    // note on
    if(learnTarget){ bindLearn('note',d1); return; }
    const m=midiMap.note[d1]; if(!m) return;
    if(m.type==='action' && ACTIONS[m.key]) ACTIONS[m.key]();
    else if(m.type==='param') setParamFromCC(m.key,d2);
  }
}
function bindInputs(midi){
  const names=[];
  midi.inputs.forEach(i=>{ i.onmidimessage=onMidi; names.push(i.name); });
  midiDev = names.join(' · ') || 'no device found';
}
async function initMidi(quiet){
  if(midiState==='on') return;
  if(!navigator.requestMIDIAccess){ if(!quiet) toast('no web midi here · use chrome on desktop'); return; }
  try{
    const midi=await navigator.requestMIDIAccess({sysex:false});
    bindInputs(midi);
    midi.onstatechange=()=>{ bindInputs(midi); buildPanel(); };
    midiState='on'; buildPanel(); saveState();
    toast('midi · '+midiDev);
  }catch(e){ if(!quiet) toast('midi blocked · check browser permissions'); }
}

const panel=document.getElementById('panel');
function buildPanel(){ panel.innerHTML='';
  const mrow=document.createElement('div'); mrow.className='midirow';
  const mb=document.createElement('button');
  mb.className='chip'+(midiState==='on'?' on':'');
  mb.textContent=midiState==='on'?'MIDI · ON':'MIDI · CONNECT';
  mb.onclick=()=>initMidi(false); mrow.appendChild(mb);
  if(midiState==='on'){
    const nm=document.createElement('span'); nm.className='lbl'; nm.textContent=midiDev;
    mrow.appendChild(nm);
    Object.keys(ACTIONS).forEach(a=>{
      const bind=findBinding('action',a);
      const armed=learnTarget&&learnTarget.type==='action'&&learnTarget.key===a;
      const b=document.createElement('button');
      b.className='badge'+(armed?' learn':(bind?' map':''));
      b.textContent=`${a} · ${armed?'…':(bind||'—')}`;
      b.onclick=()=>armLearn('action',a);
      mrow.appendChild(b);
    });
    const cb=document.createElement('button'); cb.className='badge';
    cb.textContent='CLEAR MAPS';
    cb.onclick=()=>{ for(const m of ['cc','note']) for(const n in midiMap[m]) delete midiMap[m][n];
      learnTarget=null; buildPanel(); saveState(); toast('mappings cleared'); };
    mrow.appendChild(cb);
    const rb=document.createElement('button'); rb.className='badge';
    rb.textContent='RESET ALL';
    rb.onclick=()=>{ wipeState(); location.reload(); };
    mrow.appendChild(rb);
  }
  panel.appendChild(mrow);
  const row=document.createElement('div'); row.className='palrow';
  PALS.forEach((name,idx)=>{ const b=document.createElement('button');
    b.className='chip'+(P.pal===idx?' on':''); b.textContent=name;
    b.onclick=()=>{ P.pal=idx; buildPanel(); saveState(); };
    row.appendChild(b);
  });
  panel.appendChild(row);
  FIELDS.forEach(([k,lab,mn,mx,st])=>{
    const w=document.createElement('div');w.className='ctl';
    const l=document.createElement('label');
    const s=document.createElement('span'); s.textContent=lab;
    const rt=document.createElement('span'); rt.className='rt';
    const bval=document.createElement('b'); bval.textContent=Number(P[k]).toFixed(st<1?2:0);
    if(midiState==='on'){
      const bind=findBinding('param',k);
      const armed=learnTarget&&learnTarget.type==='param'&&learnTarget.key===k;
      const bg=document.createElement('button');
      bg.className='badge'+(armed?' learn':(bind?' map':''));
      bg.textContent=armed?'…':(bind||'CC—');
      bg.onclick=()=>armLearn('param',k);
      rt.appendChild(bg);
    }
    rt.appendChild(bval); l.append(s,rt);
    const r=document.createElement('input');r.type='range';r.min=mn;r.max=mx;r.step=st;r.value=P[k];
    r.oninput=()=>{P[k]=parseFloat(r.value);bval.textContent=Number(P[k]).toFixed(st<1?2:0);queueSave();};
    uiRefs[k]={input:r,val:bval,step:st};
    w.append(l,r);panel.appendChild(w);
  });
}
/* restore the last session: mappings, look, preset */
const saved=loadState();
if(saved){
  if(saved.map){ Object.assign(midiMap.cc,saved.map.cc||{}); Object.assign(midiMap.note,saved.map.note||{}); }
  if(saved.P) Object.assign(P,saved.P);
  if(saved.preset && PRESETS[saved.preset]) curPreset=saved.preset;
  hadSavedMidi=!!saved.midi;
  document.querySelectorAll('.rail .chip').forEach(c=>c.classList.toggle('on',c.dataset.p===curPreset));
}
buildPanel();

function setChip(id,on){document.getElementById(id).classList.toggle('on',on);}
document.getElementById('tune').onclick=e=>{panel.classList.toggle('open');
  e.currentTarget.classList.toggle('on',panel.classList.contains('open'));};
document.getElementById('shot').onclick=()=>{ pendingShot=true; };
document.getElementById('rec').onclick=()=>{ if(recorder&&recorder.state==='recording') stopRec(); else startRec(); };
document.getElementById('flip').onclick=()=>{ if(usingFile){facing='environment';startCam();return;}
  facing=facing==='user'?'environment':'user';startCam();};
document.getElementById('srcCam').onclick=()=>startCam();
document.getElementById('srcFile').onclick=()=>document.getElementById('file').click();
document.getElementById('file').onchange=e=>{ if(e.target.files[0]) useFile(e.target.files[0]); };

let toastT;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2800);}

document.getElementById('enter').onclick=()=>{
  document.getElementById('gate').style.display='none'; resize(); startCam();
  if(hadSavedMidi) initMidi(true);   // reload mid-show: knobs come back on their own
};
</script>
